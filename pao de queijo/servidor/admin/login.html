<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>
body{
font-family:Arial;
background:#fff7e8;
text-align:center;
padding:50px;
}

input,button{
padding:12px;
margin:10px;
}

button{
background:#c87916;
color:white;
border:0;
border-radius:20px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>🧀 Área do Dono</h1>

<input id="senha" type="password" placeholder="Senha">

<br>

<button onclick="entrar()">
Entrar
</button>


<script>

function entrar(){

let senha =
document.getElementById("senha").value;


if(senha=="1234"){

localStorage.setItem(
"admin",
"ok"
);


window.location="painel.html";


}else{

alert("Senha incorreta");

}

}

</script>


</body>
</html>
